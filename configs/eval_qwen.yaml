  - id: focal_accreta_subtle_001

    text: |
      МРТ малого таза. Беременность 31 неделя. Состояние после одного кесарева сечения.

      Плацента расположена по передней стенке матки с распространением на область нижнего сегмента. Нижний край плаценты достигает внутреннего зева без полного перекрытия.

      В проекции послеоперационного рубца определяется локальное нарушение четкости границы между плацентой и миометрием. Миометрий в данной зоне неравномерно истончен до 1–2 мм, однако на всем протяжении прослеживается.

      Определяются единичные лакуны в толще плаценты. Умеренно выраженные ретроплацентарные сосуды без формирования грубых сосудистых конгломератов.

      Маточно-пузырное пространство сохранено. Признаков инвазии в мочевой пузырь и параметрий не выявлено. Грыжевидного выбухания стенки матки не определяется.

      Заключение: МР-признаки могут соответствовать focal placenta accreta в области послеоперационного рубца.

