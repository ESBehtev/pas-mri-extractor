  - id: posterior_percreta_parametrium_001

    text: |
      МРТ малого таза. Беременность 35 недель. Состояние после трех кесаревых сечений.

      Плацента преимущественно расположена по задней стенке матки с распространением на нижний сегмент и область внутреннего зева. Отмечается частичное предлежание плаценты.

      В нижних отделах задней стенки определяется практически полное отсутствие визуализации миометрия на протяжении до 4 см. Контур матки в данной зоне выбухает кзади.

      В толще плаценты множественные крупные лакуны неправильной формы. В ретроплацентарной зоне выраженные расширенные сосудистые структуры с распространением в параметральную клетчатку.

      Отмечается нечеткость наружного контура матки с вероятным выходом патологического процесса за пределы серозной оболочки. Участками определяется тяжистость и инфильтрация параметрия. Признаков инвазии мочевого пузыря не выявлено.

