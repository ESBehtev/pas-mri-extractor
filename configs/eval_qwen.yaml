  - id: equivocal_increta_vs_percreta_001

    text: |
      МРТ малого таза. Беременность 34 недели. Два кесаревых сечения в анамнезе.

      Плацента расположена по передней стенке матки с полным предлежанием. В области послеоперационного рубца определяется выраженное истончение миометрия, местами миометрий практически не дифференцируется.

