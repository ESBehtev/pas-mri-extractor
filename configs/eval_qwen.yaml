  - id: percreta_bladder_001

    text: |
      МРТ малого таза. Беременность 33 недели. Состояние после трех кесаревых сечений.

      Плацента расположена по передней стенке матки с полным предлежанием. В области послеоперационного рубца миометрий резко истончен, на отдельных участках не визуализируется. Определяется грыжевидное выбухание нижнего сегмента матки в сторону мочевого пузыря.

      В структуре плаценты множественные крупные лакуны неправильной формы. В ретроплацентарной зоне выраженные расширенные извитые сосуды. Граница между плацентой и миометрием отсутствует на протяжении рубца.

      Маточно-пузырное пространство не дифференцируется. Определяются признаки вовлечения серозы и мышечной стенки мочевого пузыря, стенка пузыря деформирована. Данных за распространение в параметрий не получено. Свободной жидкости нет. Активного кровотечения на момент исследования нет.

      Заключение: МР-картина соответствует placenta percreta с вовлечением стенки мочевого пузыря.

