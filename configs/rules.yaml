version: "0.1"

normalization:
  lowercase: true
  replace:
    "褢": "械"

default_features:
  invasion_type: "none"
  invasion_confidence: "absent"
  bladder_involvement: "absent"
  parametrium_involvement: "absent"
  posterior_wall_involvement: "absent"
  placenta_previa: "absent"
  anterior_placenta: "absent"
  retroplacental_vessels: "absent"
  lacunae: "absent"
  uterine_wall_thinning: "absent"
  uterine_hernia_or_bulging: "absent"
  preoperative_bleeding: "absent"
  previous_cs_count: null
  gestational_week: null
  short_explanation: ""

regex_features:

  placenta_previa:
    present: "锌褉械写谢械卸|锌械褉械泻褉褘胁邪械褌\\s+胁薪褍褌褉械薪薪\\w*\\s+蟹械胁|薪懈蟹泻"

  anterior_placenta:
    present: "锌械褉械写薪\\w*\\s+褋褌械薪泻"

  retroplacental_vessels:
    present: "褉械褌褉芯锌谢邪褑械薪褌邪褉薪|褉邪褋褕懈褉械薪薪\\w*.*褋芯褋褍写|锌芯谢薪芯泻褉芯胁薪\\w*.*褋芯褋褍写|褋芯褋褍写懈褋褌"

  lacunae:
    present: "谢邪泻褍薪"

  uterine_wall_thinning:
    present: "懈褋褌芯薪褔\\w*.*屑懈芯屑械褌褉|懈褋褌芯薪褔\\w*.*褉褍斜褑|屑懈芯屑械褌褉\\w*.*薪械\\s+锌褉芯褋谢械卸"

  uterine_hernia_or_bulging:
    present: "胁褘斜褍褏|锌褉芯谢邪斜|谐褉褘卸"

  preoperative_bleeding:
    present: "泻褉芯胁芯褌械褔"

  bladder_involvement:
    present: "胁芯胁谢械褔\\w*.*屑芯褔械胁|懈薪胁邪蟹懈\\w*.*屑芯褔械胁|锌褉芯褉邪褋褌邪薪\\w*.*屑芯褔械胁|写械褎芯褉屑邪褑\\w*.*屑芯褔械胁"
    possible: "薪械谢褜蟹褟\\s+懈褋泻谢褞褔懈褌褜.*屑芯褔械胁|胁芯蟹屑芯卸薪芯.*屑芯褔械胁|锌芯写芯蟹褉\\w*.*屑芯褔械胁|屑邪褌芯褔薪芯-锌褍蟹褘褉薪\\w*.*薪械\\s+(?:锌褉芯褋谢械卸|写懈褎褎械褉械薪褑)"

  parametrium_involvement:
    present: "锌邪褉邪屑械褌褉|锌邪褉邪屑械褌褉邪谢褜薪"

  posterior_wall_involvement:
    present: "蟹邪写薪\\w*\\s+褋褌械薪泻\\w*\\s+屑邪褌泻|蟹邪写薪\\w*\\s+褋褌械薪泻\\w*\\s+屑芯褔械胁"

regex_numeric:

  gestational_week:
    pattern: "(\\d+)\\s*薪械写械谢"
    group: 1
    type: int

  previous_cs_count:
    pattern: "锌芯褋谢械\\s*(\\d+)\\s*(?:泻褋|泻械褋邪褉)"
    group: 1
    type: int

invasion_type_rules:

  percreta:
    priority: 3
    patterns:
      - "\\bplacenta\\s+percreta\\b"
      - "写芯褋褌芯胁械褉薪\\w*.{0,40}懈薪胁邪蟹懈\\w*.{0,40}褋褌械薪泻\\w*\\s+屑芯褔械胁"
      - "写芯褋褌芯胁械褉薪\\w*.{0,40}胁芯胁谢械褔\\w*.{0,40}屑芯褔械胁"
      - "懈薪胁邪蟹懈\\w*.{0,40}褋褌械薪泻\\w*\\s+屑芯褔械胁"
      - "锌褉芯褉邪褋褌邪薪\\w*.{0,40}褋褌械薪泻\\w*\\s+屑芯褔械胁"
      - "锌褉芯褉邪褋褌邪薪\\w*.{0,40}蟹邪\\s+锌褉械写械谢\\w*\\s+屑懈芯屑械褌褉"
      - "蟹邪\\s+锌褉械写械谢\\w*\\s+屑懈芯屑械褌褉"

  increta:
    priority: 2
    patterns:
      - "\\bincreta\\b"
      - "胁褉邪褋褌邪薪\\w*.*屑懈芯屑械褌褉"
      - "锌褉芯褉邪褋褌邪薪\\w*.*屑懈芯屑械褌褉"
      - "屑懈芯屑械褌褉\\w*.*薪械\\s+锌褉芯褋谢械卸"

  accreta:
    priority: 1
    patterns:
      - "\\baccreta\\b"
      - "锌谢芯褌薪\\w*.*锌褉懈泻褉械锌"
      - "锌芯胁械褉褏薪芯褋褌薪\\w*.*胁褉邪褋褌邪薪"
      - "胁褉邪褋褌邪薪\\w*.*锌谢邪褑械薪褌"

invasion_confidence_rules:
  possible:
    - "薪械谢褜蟹褟\\s+懈褋泻谢褞褔懈褌褜"
    - "胁芯蟹屑芯卸薪芯"
    - "锌芯写芯蟹褉"

  probable:
    - "胁械褉芯褟褌"
    - "褋芯芯褌胁械褌褋褌胁褍械褌"

  default_if_invasion_present: "definite"
  default_if_no_invasion: "absent"

short_explanation_templates:
  invasion_type: "褌懈锌 胁褉邪褋褌邪薪懈褟: {value}"
  placenta_previa: "锌褉械写谢械卸邪薪懈械 锌谢邪褑械薪褌褘"
  anterior_placenta: "锌械褉械写薪褟褟 谢芯泻邪谢懈蟹邪褑懈褟 锌谢邪褑械薪褌褘"
  uterine_wall_thinning: "懈褋褌芯薪褔械薪懈械 屑懈芯屑械褌褉懈褟/褉褍斜褑邪"
  lacunae: "锌谢邪褑械薪褌邪褉薪褘械 谢邪泻褍薪褘"
  retroplacental_vessels: "褉邪褋褕懈褉械薪薪褘械/褉械褌褉芯锌谢邪褑械薪褌邪褉薪褘械 褋芯褋褍写褘"
  bladder_involvement: "屑芯褔械胁芯泄 锌褍蟹褘褉褜: {value}"

short_explanation_default: "袟薪邪褔懈屑褘褏 锌褉懈蟹薪邪泻芯胁 胁褉邪褋褌邪薪懈褟 锌芯 褌械泻褋褌褍 薪械 胁褘写械谢械薪芯."
