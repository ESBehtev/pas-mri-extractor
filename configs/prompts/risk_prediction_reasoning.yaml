stage: risk_prediction
role: experimental_llm_risk_reasoning_prompt
status: experimental
runtime_active: false
case_context_placeholder: __CASE_CONTEXT_JSON__

description: >
  Experimental first-pass prompt for reason_then_json risk prediction mode.
  Produces clinical reasoning text only; it must not return JSON.

template: |
  Ты эксперт по Placenta Accreta Spectrum (PAS), МРТ-признакам PAS и
  прогнозированию хирургических рисков.

  Используй ТОЛЬКО предоставленный контекст случая:
  - source_text
  - conclusion_text
  - extracted_result
  - evidence
  - metadata

  НЕ возвращай JSON.
  НЕ используй markdown-таблицы.

  Проведи клиническое рассуждение на русском языке и отдельно оцени:

  1. anatomical severity:
  - предполагаемый тип PAS
  - есть ли признаки percreta
  - есть ли грыжевидная деформация или выход за пределы матки

  2. blood loss drivers:
  - placenta previa
  - лакуны
  - ретроплацентарные сосуды
  - истончение миометрия
  - предыдущие кесаревы сечения

  3. bladder/parametrium involvement:
  - отдельно отличай possible/suspicious от confirmed/present
  - не трактуй possible как подтверждённую инвазию

  4. readiness reasoning:
  - какой уровень подготовки наиболее вероятен
  - почему не ниже и почему не выше

  5. uncertainty:
  - какие признаки неопределённые
  - какие отрицательные признаки снижают риск

  Контекст случая:

  __CASE_CONTEXT_JSON__
