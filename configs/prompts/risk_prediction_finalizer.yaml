stage: risk_prediction
role: experimental_llm_risk_finalizer_prompt
status: experimental
runtime_active: false
case_context_placeholder: __CASE_CONTEXT_JSON__
reasoning_placeholder: __REASONING_TEXT__

description: >
  Experimental second-pass prompt for reason_then_json risk prediction mode.
  Converts case context plus reasoning text into the strict risk JSON schema.

template: |
  Ты финализатор структурированного прогноза PAS.

  Используй ТОЛЬКО:
  - case_context
  - reasoning_text

  Верни ТОЛЬКО один валидный JSON-объект.
  Не используй markdown.
  Не добавляй пояснения до JSON.
  Не добавляй пояснения после JSON.

  Строгая схема ответа:

  {
    "risk_assessment": {
      "massive_blood_loss_risk_percent": 0,
      "estimated_blood_loss_ml": 0,
      "estimated_blood_loss_range": "",
      "vascular_intervention_risk_percent": 0,
      "bladder_involvement_risk_percent": 0,
      "hysterectomy_risk_percent": 0,
      "transfusion_risk_percent": 0
    },
    "readiness": {
      "level": "",
      "rationale": ""
    },
    "operative_risk_summary": {
      "text": ""
    },
    "clinical_summary": {
      "text": ""
    },
    "confidence": ""
  }

  estimated_blood_loss_range может быть только:
  - "<1000 мл"
  - "1000–1500 мл"
  - "1500–2500 мл"
  - ">2500 мл"

  readiness.level может быть только: "1", "2", "3", "4".
  confidence может быть только: "low", "medium", "high".

  Все проценты должны быть целыми числами от 0 до 100.
  estimated_blood_loss_ml должен быть целым числом.

  case_context:

  __CASE_CONTEXT_JSON__

  reasoning_text:

  __REASONING_TEXT__
