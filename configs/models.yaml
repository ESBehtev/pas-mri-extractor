default_model: qwen_3_6_35b_gguf

models:

  qwen3_27b_gguf:
    display_name: Qwen3.6-27B-MTP GGUF UD-Q4_K_XL
    model_path: ~/pas-mri-extractor/models/Qwen3.6-27B-MTP-GGUF/UD-Q4_K_XL.gguf
    hf_repo: unsloth/Qwen3.6-27B-MTP-GGUF
    hf_filename: UD-Q4_K_XL.gguf
    backend: llama_cpp
    quantization: GGUF UD-Q4_K_XL

    generation:
      temperature: 0.0
      top_p: 0.8
      repeat_penalty: 1.05
      seed: 42
      max_tokens: 2048
      max_new_tokens: 2048

    output:
      response_format:
        type: json_object
      enforce_json: true

    tokenizer:
      use_chat_template: true
      skip_special_tokens: true

    runtime:
      n_gpu_layers: -1
      n_ctx: 8192
      n_batch: 512
      verbose: false

  qwen_3_6_35b_gguf:
    display_name: Qwen3.6-35B-A3B GGUF Q4_K_M
    model_id_or_path: models/qwen3.6-35b-a3b-gguf/Qwen3.6-35B-A3B-Q4_K_M.gguf
    hf_repo: lmstudio-community/Qwen3.6-35B-A3B-GGUF
    hf_filename: Qwen3.6-35B-A3B-Q4_K_M.gguf
    backend: llama_cpp
    quantization: GGUF Q4_K_M

    generation:
      temperature: 0.0
      top_p: 1.0
      max_new_tokens: 3000

    tokenizer:
      use_chat_template: true
      skip_special_tokens: true

    runtime:
      n_gpu_layers: -1
      n_ctx: 8192
      verbose: false

  qwen_3_6_35b:
    display_name: Qwen3.6-35B-A3B
    model_id_or_path: models/qwen3.6-35b-a3b
    hf_repo: Qwen/Qwen3.6-35B-A3B
    backend: transformers
    quantization: bitsandbytes_4bit
    load_in_4bit: true
    torch_dtype: bfloat16
    device: cuda
    bnb_4bit_quant_type: nf4
    max_context: 8192

    generation:
      do_sample: false
      temperature: 0.1
      top_p: 0.9
      repetition_penalty: 1.05
      max_new_tokens: 1200

    tokenizer:
      truncation: true
      max_input_tokens: 8192
      use_chat_template: true
      skip_special_tokens: true

    runtime:
      device: cuda
      dtype: bfloat16
      device_map: auto

    quantization_config:
      load_in_4bit: true
      bnb_4bit_compute_dtype: bfloat16
      bnb_4bit_use_double_quant: true
      bnb_4bit_quant_type: nf4

  qwen_1_5b:
    display_name: Qwen2.5-1.5B-Instruct
    model_id: Qwen/Qwen2.5-1.5B-Instruct
    backend: transformers

    generation:
      do_sample: false
      repetition_penalty: 1.05
      max_new_tokens: 512

    tokenizer:
      truncation: true
      max_input_tokens: 4096
      use_chat_template: true
      skip_special_tokens: true

    runtime:
      device: auto
      dtype: auto

  qwen_2_5_7b:
    display_name: Qwen2.5-7B-Instruct
    model_id: Qwen/Qwen2.5-7B-Instruct
    backend: transformers

    generation:
      do_sample: false
      repetition_penalty: 1.05
      max_new_tokens: 768

    tokenizer:
      truncation: true
      max_input_tokens: 8192
      use_chat_template: true
      skip_special_tokens: true

    runtime:
      device: auto
      dtype: auto

  qwen_7b:
    display_name: Qwen2.5-7B-Instruct (legacy alias)
    model_id: Qwen/Qwen2.5-7B-Instruct
    backend: transformers

    generation:
      do_sample: false
      repetition_penalty: 1.05
      max_new_tokens: 768

    tokenizer:
      truncation: true
      max_input_tokens: 8192
      use_chat_template: true
      skip_special_tokens: true

    runtime:
      device: auto
      dtype: auto

  medgemma_1_5_4b:
    display_name: MedGemma 1.5 4B IT
    model_id: google/medgemma-1.5-4b-it
