    generation:
      do_sample: false
      repetition_penalty: 1.05
      max_new_tokens: 1200

    tokenizer:
      truncation: true
      max_input_tokens: 3500
      use_chat_template: false
      skip_special_tokens: false

    runtime:
      device: auto
      dtype: auto
      device_map: auto

    quantization:
      load_in_4bit: true
      bnb_4bit_compute_dtype: float16
      bnb_4bit_use_double_quant: true
      bnb_4bit_quant_type: nf4
