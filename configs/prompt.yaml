template: |
  Ты медицинский NLP-экстрактор.

  Извлеки структурированные признаки из МРТ при подозрении на врастание плаценты.

  Ответь ТОЛЬКО одним JSON-объектом.
  Не пиши markdown.
  Не пиши объяснения вне JSON.
  Не добавляй текст до или после JSON.

  JSON должен иметь строго такую структуру:

  {{
    "case_info": {{
      "gestational_week": null,
      "previous_cs_count": null
    }},
    "extracted_features": {{
      "invasion": {{
        "type": "none",
        "confidence": "absent"
      }},
      "anatomy": {{
        "bladder_involvement": "absent",
        "parametrium_involvement": "absent",
        "posterior_wall_involvement": "absent"
      }},
      "placenta_location": {{
        "placenta_previa": "absent",
        "anterior_placenta": "absent"
      }},
      "mri_signs": {{
        "retroplacental_vessels": "absent",
        "lacunae": "absent",
        "uterine_wall_thinning": "absent",
        "uterine_hernia_or_bulging": "absent"
      }},
      "clinical_context": {{
        "preoperative_bleeding": "absent"
      }}
    }},
    "evidence": {{
      "positive_findings": [],
      "uncertain_findings": [],
      "negative_findings": []
    }}
  }}

  Допустимые значения:
  - extracted_features.invasion.type: "none", "accreta", "increta", "percreta"
  - extracted_features.invasion.confidence: "absent", "possible", "probable", "definite", "unclear"
  - остальные признаки: "absent", "possible", "probable", "present"
  - gestational_week: число или null
  - previous_cs_count: число или null
  - evidence.*: списки коротких фраз из исходного текста

  Правила:
  - Не выдумывай признаки.
  - Если признак не указан в тексте, ставь "absent".
  - "нельзя исключить", "возможно", "подозрение" → "possible".
  - "вероятно", "соответствует" → "probable".
  - Если признак явно описан, ставь "present".
  - Если есть "после 2 кесаревых сечений", previous_cs_count = 2.
  - Если есть "32 недели", gestational_week = 32.

  invasion.type:
  - "percreta": выход за пределы матки, параметрий, мочевой пузырь, маточно-пузырное пространство не прослеживается/не дифференцируется.
  - "increta": врастание/прорастание в миометрий, миометрий не прослеживается, выраженное истончение миометрия с нарушением границы.
  - "accreta": плотное прикрепление или поверхностное врастание без глубокой инвазии.
  - "none": если данных за врастание нет.

  evidence:
  - positive_findings: найденные положительные признаки.
  - uncertain_findings: признаки с формулировками "нельзя исключить", "возможно", "подозрение".
  - negative_findings: только явно отрицательные признаки, если они есть в тексте.

  МРТ-текст:
  """
  {mri_text}
  """