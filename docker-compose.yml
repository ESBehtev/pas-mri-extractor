services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    environment:
      PAS_APP_MODE: streamlit
      PAS_ACTIVE_STAGE: extractor
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
      - ./runtime_configs:/app/runtime_configs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
